# PolySign stack
#
# Production (EC2): real AWS DynamoDB, authenticated via EC2 instance role.
# Local dev: docker-compose.override.yml (auto-merged by Docker Compose) adds LocalStack.
#
# Usage:
#   docker compose up --build     # first time or after code changes
#   docker compose up -d          # subsequent runs (uses cached image)
#   docker compose down           # stop

services:
  polysign:
    build: .
    restart: unless-stopped
    labels:
      autoheal: "true"
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=local
      # Defaults used locally; EC2 .env overrides AWS_REGION and SPRING_PROFILES_ACTIVE.
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-test}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-test}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      # JVM: cap heap, exit on OOM so Docker/autoheal can restart cleanly.
      - JAVA_OPTS=-Xmx768m -XX:+ExitOnOutOfMemoryError -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/tmp/polysign-heapdump.hprof
    env_file:
      - path: .env
        required: false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 180s

  autoheal:
    image: willfarrell/autoheal
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - AUTOHEAL_CONTAINER_LABEL=all
