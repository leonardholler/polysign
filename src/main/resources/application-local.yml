# Profile activated when running inside docker-compose (SPRING_PROFILES_ACTIVE=local).
# For IDE development with LocalStack running separately, override AWS_ENDPOINT_URL:
#   export AWS_ENDPOINT_URL=http://localhost:4566
spring:
  config:
    activate:
      on-profile: local

aws:
  # Inside Docker network "localstack" resolves to the LocalStack container.
  # Outside Docker (IDE dev), override via AWS_ENDPOINT_URL env var.
  endpoint-override: ${AWS_ENDPOINT_URL:http://localstack:4566}
  # Static credentials for LocalStack (accepts any non-empty value).
  # Production (application-aws.yml) must NOT set these — IAM roles take over.
  access-key-id: test
  secret-access-key: test

logging:
  level:
    com.polysign: INFO
    software.amazon.awssdk.request: WARN
