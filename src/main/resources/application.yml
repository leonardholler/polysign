spring:
  application:
    name: polysign

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

aws:
  region: ${AWS_REGION:us-east-1}
  # endpoint-override is set in application-local.yml for LocalStack

polysign:
  ntfy:
    topic: ${NTFY_TOPIC:polysign-leonard-x7k2}
  detectors:
    price:
      threshold-pct: 8.0
      window-minutes: 15
      min-volume-usdc: 50000
      dedupe-window-minutes: 30
      min-delta-p: 0.03
      interval-ms: 60000
      initial-delay-ms: 65000
    statistical:
      z-score-threshold: 3.0
      min-snapshots: 20
      min-volume-usdc: 50000
    wallet:
      min-trade-usdc: 5000
      consensus-min-wallets: 3
      consensus-window-minutes: 30
    news:
      min-score: 0.5
      min-volume-usdc: 100000
  dynamodb:
    tables:
      markets: markets
      price-snapshots: price_snapshots
      articles: articles
      market-news-matches: market_news_matches
      watched-wallets: watched_wallets
      wallet-trades: wallet_trades
      alerts: alerts
  sqs:
    queues:
      news-to-process: news-to-process
      wallet-trades-to-process: wallet-trades-to-process
      alerts-to-notify: alerts-to-notify
    dlq:
      news-to-process: news-to-process-dlq
      wallet-trades-to-process: wallet-trades-to-process-dlq
      alerts-to-notify: alerts-to-notify-dlq
    max-receive-count: 5
  s3:
    archives-bucket: polysign-archives

  pollers:
    market:
      interval-ms: 60000
      initial-delay-ms: 5000
      min-volume-usdc: 10000
      min-volume-24h-usdc: 10000
      min-hours-to-end: 12
      max-markets: 400
    price:
      interval-ms: 60000
      initial-delay-ms: 30000
  consumer:
    notification:
      poll-interval-ms: 1000


# ── Resilience4j ─────────────────────────────────────────────────────────────
resilience4j:
  circuitbreaker:
    instances:
      polymarket-gamma:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
      polymarket-clob:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true

      ntfy:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 2
        automatic-transition-from-open-to-half-open-enabled: true
  retry:
    instances:
      polymarket-gamma:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2.0
        exponential-max-wait-duration: 10s
      polymarket-clob:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2.0
        exponential-max-wait-duration: 8s

      ntfy:
        max-attempts: 3
        wait-duration: 2s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2.0
        exponential-max-wait-duration: 15s
  ratelimiter:
    instances:
      polymarket-clob:
        limit-for-period: 10
        limit-refresh-period: 1s
        timeout-duration: 5s
