spring:
  application:
    name: polysign

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

aws:
  region: ${AWS_REGION:us-east-1}
  # endpoint-override is set in application-local.yml for LocalStack

polysign:
  ntfy:
    topic: ${NTFY_TOPIC:polysign-leonard-x7k2}
  detectors:
    liquidity-tiers:
      tier1-min-volume: 250000   # volume24h > this → Tier 1 (liquid)
      tier2-min-volume: 50000    # volume24h >= this → Tier 2 (moderate); below → Tier 3 (illiquid)
    price:
      threshold-pct: 8.0         # kept for reference (= tier1 value); tier1 is authoritative
      threshold-pct-tier1: 8.0
      threshold-pct-tier2: 14.0
      threshold-pct-tier3: 20.0
      window-minutes: 15
      dedupe-window-minutes: 30
      min-delta-p: 0.03
      max-bypass-per-hour: 3        # cap: at most 3 bypass-mode alerts per market per hour
      # Resolution zone config
      resolution-zone-high: 0.65    # above this, bullish resolution is interesting
      resolution-zone-low: 0.35     # below this, bearish resolution is interesting
      mid-range-threshold-multiplier: 2.0  # mid-range moves need 2x the tier threshold
      zone-entry-threshold-discount: 0.25  # zone transitions get 25% lower threshold
      # Per-window volume config
      min-window-volume: 5000       # minimum volume during the move window
      high-volume-window-threshold: 20000  # volume threshold for resolution zone discount
      interval-ms: 60000
      initial-delay-ms: 65000
    statistical:
      z-score-threshold: 3.0     # kept for reference (= tier1 value); tier1 is authoritative
      z-score-threshold-tier1: 3.0
      z-score-threshold-tier2: 4.0
      z-score-threshold-tier3: 5.0
      min-snapshots: 20
      dedupe-window-minutes: 30
      min-delta-p: 0.03
      interval-ms: 60000
      initial-delay-ms: 70000
    orderbook-gate:
      max-spread-bps: 500        # Tier 2/3 alerts dropped if spread exceeds this
      min-depth-at-mid: 100.0    # Tier 2/3 alerts dropped if depth below this (USDC)
    wallet:
      min-trade-usdc: 1000
      consensus-min-wallets: 3
      consensus-window-minutes: 30
      consensus-high-freq-trade-count: 100
      consensus-high-freq-min-usdc: 500
      consensus-min-quality-sum: 12.0
    news:
      min-score: 0.55
      min-volume-usdc: 100000
      dedupe-window-minutes: 1440   # 24 hours — same article-market pair fires once per day
      max-matches-per-article: 3    # cap: top 3 markets by score per article
      keyword-prefilter-threshold: 0.15   # minimum keyword score to pass to sentiment analysis
      sentiment-relevance-threshold: 0.3  # minimum |sentiment| to fire alert
      sentiment-confidence-threshold: 0.5 # minimum confidence to fire alert
      claude-model: "claude-sonnet-4-6"
      claude-max-tokens: 150
      claude-timeout-ms: 5000             # hard timeout on the API call
  dynamodb:
    tables:
      markets: markets
      price-snapshots: price_snapshots
      articles: articles
      market-news-matches: market_news_matches
      watched-wallets: watched_wallets
      wallet-trades: wallet_trades
      alerts: alerts
      alert-outcomes: alert_outcomes
  sqs:
    queues:
      news-to-process: news-to-process
      wallet-trades-to-process: wallet-trades-to-process
      alerts-to-notify: alerts-to-notify
    dlq:
      news-to-process: news-to-process-dlq
      wallet-trades-to-process: wallet-trades-to-process-dlq
      alerts-to-notify: alerts-to-notify-dlq
    max-receive-count: 5
  s3:
    archives-bucket: polysign-archives

  pollers:
    market:
      interval-ms: 60000
      initial-delay-ms: 5000
      min-volume-usdc: 10000
      min-volume-24h-usdc: 10000
      min-hours-to-end: 12
      max-markets: 400
      # Comma-separated regex patterns to exclude low-signal markets.
      # Matches against the full market question (case-insensitive via (?i) prefix).
      excluded-question-patterns: "(?i).*\\btweets?\\b.*\\d+.*\\d+.*,(?i).*\\bposts?\\b.*\\d+.*\\d+.*"
      # Comma-separated category names to exclude entirely (e.g. "sports").
      # Empty by default — tune via config without code changes.
      excluded-categories: ""
    price:
      interval-ms: 60000
      initial-delay-ms: 30000
    wallet:
      interval-ms: 60000
      initial-delay-ms: 90000
      lookback-hours: 48
    rss:
      interval-ms: 300000       # every 5 minutes
      initial-delay-ms: 15000   # 15s after startup (markets table may still be populating)
      feeds:
        - https://feeds.bloomberg.com/markets/news.rss        # Bloomberg Markets — financial/market-moving news
        - https://feeds.bbci.co.uk/news/world/rss.xml         # BBC World — geopolitical world news
        - https://rss.politico.com/politics-news.xml          # Politico — political intelligence for election markets
        - https://www.theguardian.com/world/rss               # The Guardian World — broad world coverage
        - https://feeds.npr.org/1001/rss.xml                  # NPR News — US news (Reuters/AP are no longer public)
  notification:
    min-precision: 0.40  # Raise back to 0.60 once price detector precision improves above 50%
  consumer:
    notification:
      poll-interval-ms: 1000
    news:
      poll-interval-ms: 1000

logging:
  level:
    com.polysign.detector.PriceMovementDetector: DEBUG


# ── Resilience4j ─────────────────────────────────────────────────────────────
resilience4j:
  circuitbreaker:
    instances:
      polymarket-gamma:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
      polymarket-clob:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true

      polymarket-data:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true

      ntfy:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 2
        automatic-transition-from-open-to-half-open-enabled: true

      claude-api:
        register-health-indicator: false
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 2
        automatic-transition-from-open-to-half-open-enabled: true

      rss-news:
        # Circuit breaker per feed host — opens if a feed is persistently down.
        # A WARN log is emitted per failure; opening the breaker suppresses retries
        # until the feed recovers (30s half-open probe).
        register-health-indicator: false
        sliding-window-type: COUNT_BASED
        sliding-window-size: 5
        failure-rate-threshold: 60
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 1
        automatic-transition-from-open-to-half-open-enabled: true
  retry:
    instances:
      polymarket-gamma:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2.0
        exponential-max-wait-duration: 10s
      polymarket-clob:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2.0
        exponential-max-wait-duration: 8s

      polymarket-data:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2.0
        exponential-max-wait-duration: 10s

      ntfy:
        max-attempts: 3
        wait-duration: 2s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2.0
        exponential-max-wait-duration: 15s

      rss-news:
        max-attempts: 3
        wait-duration: 2s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2.0
        exponential-max-wait-duration: 10s
  ratelimiter:
    instances:
      polymarket-clob:
        limit-for-period: 10
        limit-refresh-period: 1s
        timeout-duration: 5s
