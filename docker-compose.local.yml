# Offline dev overlay — layers LocalStack over the base compose file.
# Usage: docker compose -f docker-compose.yml -f docker-compose.local.yml up --build

services:
  localstack:
    image: localstack/localstack:3.8   # DO NOT change to :latest — requires auth token
    ports:
      - "4566:4566"
    environment:
      - SERVICES=dynamodb,sqs,s3
      - AWS_DEFAULT_REGION=us-east-2
      - DEBUG=0
    volumes:
      - localstack_data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s

  polysign:
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - AWS_ENDPOINT_URL=http://localstack:4566
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_REGION=us-east-2
    depends_on:
      localstack:
        condition: service_healthy

volumes:
  localstack_data:
